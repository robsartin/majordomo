services:
  db:
    image: postgres:18
    container_name: majordomo-db
    environment:
      POSTGRES_DB: majordomo
      POSTGRES_USER: majordomo
      POSTGRES_PASSWORD: majordomo
    ports:
      - "5432:5432"
    volumes:
      - majordomo-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U majordomo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: majordomo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  majordomo-data:
