services:
  app:
    build: .
    container_name: majordomo-app
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/majordomo
      SPRING_DATASOURCE_USERNAME: majordomo
      SPRING_DATASOURCE_PASSWORD: majordomo
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:18
    container_name: majordomo-db
    environment:
      POSTGRES_DB: majordomo
      POSTGRES_USER: majordomo
      POSTGRES_PASSWORD: majordomo
    ports:
      - "3946:5432"
    volumes:
      - majordomo-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U majordomo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: majordomo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: majordomo-prometheus
    ports:
      - "9095:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      app:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: majordomo-grafana
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_started

volumes:
  majordomo-data:
  prometheus-data:
  grafana-data:
