spring:
  application:
    name: majordomo

  datasource:
    url: jdbc:postgresql://localhost:5432/majordomo
    username: majordomo
    password: majordomo

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 300000
      key-prefix: "majordomo:"
      use-key-prefix: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,email,profile

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: when-authorized

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state:
          seconds: 10
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      notification:
        base-config: default
      fileStorage:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration:
          millis: 500
        exponential-backoff-multiplier: 2
    instances:
      notification:
        base-config: default
      fileStorage:
        base-config: default
        max-attempts: 2
  timelimiter:
    configs:
      default:
        timeout-duration:
          seconds: 5
    instances:
      notification:
        base-config: default
      fileStorage:
        timeout-duration:
          seconds: 10

majordomo:
  storage:
    base-dir: ./data/attachments
    max-file-size: 10485760
    allowed-types: image/jpeg,image/png,application/pdf,text/plain
  notifications:
    cron: "0 0 8 * * *"
    warranty-cron: "0 0 9 * * *"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
