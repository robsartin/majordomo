spring:
  datasource:
    url: jdbc:tc:postgresql:18:///majordomo
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: majordomo
    password: majordomo
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
